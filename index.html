<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#101511">
  <title>Podcast Radar</title>
  <link rel="stylesheet" href="assets/css/podcast.css?v=2">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <h1 id="title">Podcast Radar</h1>
      <p id="subtitle">Latest 24-hour All India Radio, health, finance, markets, policy and useful long-form listening</p>
    </div>
    <div class="status">
      <span id="updated">Loading</span>
      <a id="youtube-search" href="#" target="_blank" rel="noopener">Source</a>
    </div>
  </header>

  <main class="layout">
    <section class="player-shell" aria-label="Selected episode">
      <div class="now-playing">
        <img id="player-art" alt="">
        <div>
          <p>Podcast audio</p>
          <h2 id="player-title">Select an episode</h2>
          <span id="player-subtitle">Ready</span>
        </div>
      </div>
      <audio id="player" controls preload="none"></audio>
      <div id="empty-player" class="empty-player">Select an episode</div>
    </section>

    <section class="controls" aria-label="Podcast controls">
      <nav id="tabs" class="tabs" aria-label="Categories"></nav>
      <label class="search">
        <span>Search</span>
        <input id="filter" type="search" autocomplete="off">
      </label>
    </section>

    <section id="episodes" class="episodes" aria-label="Episodes"></section>
  </main>

  <script src="assets/js/podcast.js?v=2"></script>
</body>
</html>
